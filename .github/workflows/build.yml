name: Build ffmpeg-kit-full 16KB AAR

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout ffmpeg-kit source
        uses: actions/checkout@v4
        with:
          repository: arthenica/ffmpeg-kit
          ref: main

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git doxygen nasm \
            cmake gcc gperf texinfo yasm bison autogen wget autopoint \
            meson ninja-build ragel groff gtk-doc-tools libtasn1-6-dev \
            libtasn1-bin unzip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK cmdline-tools and NDK r26d (self-managed, no third-party SDK/NDK actions)
        run: |
          set -e
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -sSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null || true
          # Pinned to r26d, not r27: NDK r27 dropped the NDK_PROC_*_ABI / NDK_ARCH_*_ABI
          # compatibility variables from build/cmake/abis.cmake. CMake's own
          # Android-Determine.cmake relies on those when a dependency (e.g. libsrt)
          # configures via raw CMAKE_SYSTEM_PROCESSOR=aarch64 instead of the NDK's
          # own android.toolchain.cmake — that combination fails on r27+ with
          # "Android: Unknown processor CMAKE_SYSTEM_PROCESSOR='aarch64'".
          # r26d still has the compat shims, and our manual 16KB linker flags below
          # are Google's documented approach for r27-or-lower anyway, so this
          # doesn't cost us anything on the 16KB-alignment goal.
          sdkmanager --install "ndk;26.3.11579264" "platform-tools" "platforms;android-34" > /dev/null
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          # libvpx's own build tooling reads the bare ANDROID_NDK variable
          # (separate from ANDROID_NDK_ROOT/ANDROID_NDK_HOME, which is what
          # ffmpeg-kit's own scripts use). Without this, it silently falls
          # back to whatever NDK is preinstalled on the GitHub-hosted runner
          # image (r27+ as of mid-2026), which lacks the NDK_PROC_*_ABI /
          # NDK_ARCH_*_ABI compat vars some Android CMake toolchain detection
          # paths rely on — producing "Toolchain is unable to link
          # executables" at libvpx's configure step even though every other
          # library in this same build succeeds under r26d.
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Confirm SDK/NDK environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK=$ANDROID_NDK"
          ls "$ANDROID_NDK_ROOT" | head -20

      - name: Patch Android.mk for 16KB page size
        run: |
          MK=android/jni/Android.mk
          sed -i '/LOCAL_MODULE *:= *ffmpegkit$/a LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384' "$MK"
          sed -i '/LOCAL_MODULE *:= *ffmpegkit_abidetect$/a LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384' "$MK"
          echo "----- Patched Android.mk (grep check) -----"
          grep -n -A1 "LOCAL_MODULE" "$MK"

      - name: Patch ffmpeg.sh LDFLAGS for 16KB page size
        run: |
          FILE=scripts/android/ffmpeg.sh
          # Insert 16KB linker flags into the LDFLAGS export line used during FFmpeg's own build
          sed -i 's/^export LDFLAGS="\$(get_ldflags "\${LIB_NAME}")"$/export LDFLAGS="$(get_ldflags "${LIB_NAME}") -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"/' "$FILE"
          echo "----- Patched ffmpeg.sh (grep check) -----"
          grep -n "LDFLAGS=" "$FILE" || true

      - name: Patch fftools_ffmpeg_mux_init.c for NDK r26+ Clang bit-field error
        run: |
          # Newer Clang (bundled with NDK r26+) added -Wsingle-bit-bitfield-constant-conversion,
          # which -Werror promotes to a hard error. FFmpeg's EncStats struct declares these as
          # signed 1-bit fields (legal range -1..0) but initializes them with the literal 1,
          # which is only valid for an unsigned 1-bit field (range 0..1). This is the same fix
          # arthenica applied upstream for this exact error (ffmpeg-kit issue #1076): widen the
          # three fields to unsigned.
          FILE=android/ffmpeg-kit-android-lib/src/main/cpp/fftools_ffmpeg_mux_init.c
          sed -i -E \
            -e 's/\bint([[:space:]]+pre_only:1;)/unsigned int\1/' \
            -e 's/\bint([[:space:]]+post_only:1;)/unsigned int\1/' \
            -e 's/\bint([[:space:]]+need_input_data:1;)/unsigned int\1/' \
            "$FILE"
          echo "----- Patched fftools_ffmpeg_mux_init.c (grep check) -----"
          grep -n "unsigned int.*pre_only:1\|unsigned int.*post_only:1\|unsigned int.*need_input_data:1" "$FILE"
          MATCHES=$(grep -c "unsigned int.*pre_only:1\|unsigned int.*post_only:1\|unsigned int.*need_input_data:1" "$FILE" || true)
          if [ "$MATCHES" -lt 3 ]; then
            echo "ERROR: expected 3 patched bit-field declarations, found $MATCHES. Upstream source may have changed — check this file manually."
            exit 1
          fi

      - name: Create clang++ wrapper stripping -static (for libvpx configure link probe)
        run: |
          # libvpx's configure runs a check_ld() sanity probe that links a
          # trivial test program with -static. NDK's own libc++abi.a is not
          # built to be pulled into a fully-static (non-PIE) executable —
          # ld.lld rejects its objects as "incompatible with aarch64linux"
          # even though the same objects link fine normally. This is a
          # known Clang/libc++ limitation (no supported way to statically
          # link libc++abi while still linking other libs dynamically),
          # unrelated to our NDK pin, our other patches, or the actual
          # ffmpeg-kit/libvpx shared-library build that follows.
          #
          # Fix: wrap clang++ so it silently drops any -static argument
          # before invoking the real compiler.
          mkdir -p "$HOME/vpx-cxx-wrapper"
          REAL_CXX="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++"
          WRAPPER="$HOME/vpx-cxx-wrapper/aarch64-linux-android24-clang++"
          {
            printf '#!/bin/bash\n'
            printf 'args=()\n'
            printf 'for arg in "$@"; do\n'
            printf '  if [ "$arg" != "-static" ]; then\n'
            printf '    args+=("$arg")\n'
            printf '  fi\n'
            printf 'done\n'
            printf 'exec "%s" "${args[@]}"\n' "$REAL_CXX"
          } > "$WRAPPER"
          chmod +x "$WRAPPER"
          cat "$WRAPPER"
          echo "VPX_CXX_WRAPPER_DIR=$HOME/vpx-cxx-wrapper" >> "$GITHUB_ENV"

      - name: Create writable /usr/local/lib for SRT's hardcoded install prefix
        run: |
          # SRT's CMake build defaults CMAKE_INSTALL_PREFIX to /usr/local
          # and its own "make install" step (triggered internally by
          # android.sh's SRT build) tries to copy libsrt.so.<ver> there.
          # The runner user can't write to /usr/local/lib by default, so
          # this fails with:
          #   CMake Error at cmake_install.cmake:57 (file):
          #     file INSTALL cannot copy file ".../libsrt.so.1.5.2"
          #     to "/usr/local/lib/libsrt.so.1.5.2": Permission denied.
          # even though libsrt.a/libsrt.so themselves already built and
          # linked successfully just before this step.
          #
          # sudo is available and passwordless on GitHub-hosted ubuntu-24.04
          # runners, so just make the directory SRT actually targets
          # writable rather than chasing CMAKE_INSTALL_PREFIX propagation
          # through android.sh/SRT's CMakeLists.
          sudo mkdir -p /usr/local/lib
          sudo chown -R "$(id -u):$(id -g)" /usr/local/lib

      - name: Build ffmpeg-kit (full minus libass/fontconfig, non-GPL, arm64-v8a only)
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          chmod +x android.sh
          set -o pipefail
          # Put the -static-stripping wrapper first on PATH for this step
          # only, so libvpx's configure link probe uses it instead of the
          # real clang++. Every other library's build (and libvpx's actual
          # shared-library compile, which never passes -static) still
          # resolves to the same wrapper, but the wrapper is a no-op unless
          # -static is present, so nothing else is affected.
          export PATH="$VPX_CXX_WRAPPER_DIR:$PATH"

          # SRT's own sample CLI apps (srt-live-transmit, srt-file-transmit,
          # srt-tunnel) fail to link: openssl's libcrypto.a references zlib
          # symbols (inflateInit_, deflate, etc. via its BIO zlib bridge)
          # that never get linked in for these executables specifically,
          # producing "undefined symbol" errors from ld.lld. This doesn't
          # affect libsrt.a/libsrt.so themselves, which already link
          # successfully before the apps are attempted — our app only needs
          # the library, not these instructional sample binaries.
          #
          # Fix: SRT's own documented CMake option -DENABLE_APPS=OFF skips
          # building these apps entirely. Since android.sh downloads SRT's
          # source mid-build (it doesn't exist yet at this point), we patch
          # its CMakeLists.txt default via a background watcher that fires
          # the instant the file appears, rather than as a separate
          # pre-build step.
          (
            for _ in $(seq 1 600); do
              FILE=$(find . -path "*/src/srt/CMakeLists.txt" -print -quit 2>/dev/null)
              if [ -n "$FILE" ] && ! grep -q 'option(ENABLE_APPS "Should the Support Applications be Built?" OFF)' "$FILE" 2>/dev/null; then
                sed -i 's/option(ENABLE_APPS .*/option(ENABLE_APPS "Should the Support Applications be Built?" OFF)/' "$FILE"
                echo "PATCHED: forced ENABLE_APPS=OFF in $FILE"
                break
              fi
              sleep 1
            done
          ) &
          SRT_WATCHER_PID=$!
          # libass (and therefore fontconfig, which libass depends on per
          # arthenica's own External-Libraries wiki page) is intentionally
          # OMITTED. libass is subtitle rendering/burn-in support, which this
          # app does not use (confirmed: no -vf ass=/subtitles= anywhere in
          # the remux pipeline, which is -c copy throughout).
          #
          # Root cause this avoids: libass -> fontconfig -> libuuid, and
          # libuuid's gen_uuid.c calls flock() without the feature-test macro
          # Bionic needs to expose that prototype under -std=c99, which
          # modern Clang treats as a hard error (-Wimplicit-function-declaration),
          # not a warning. Dropping libass removes the entire broken dependency
          # chain at its root instead of patching legacy C in a library we
          # don't need. Omitting --enable-fontconfig alone is NOT sufficient,
          # since --enable-libass pulls fontconfig back in transitively.
          #
          # freetype and fribidi are ALSO dropped here since their only
          # consumer in this build was libass (freetype for glyph rendering,
          # fribidi for bidi text shaping). Neither is used by anything else
          # in this dependency set.
          #
          # Nothing here affects TLS/HTTP/codec support: gnutls, openssl,
          # dav1d, libvpx, libwebp, opus, lame, srt, etc. are all untouched.
          ./android.sh \
            --disable-arm-v7a \
            --disable-arm-v7a-neon \
            --disable-x86 \
            --disable-x86-64 \
            --enable-android-media-codec \
            --enable-android-zlib \
            --enable-dav1d \
            --enable-gmp \
            --enable-gnutls \
            --enable-kvazaar \
            --enable-lame \
            --enable-libiconv \
            --enable-libilbc \
            --enable-libtheora \
            --enable-libvorbis \
            --enable-libvpx \
            --enable-libwebp \
            --enable-libxml2 \
            --enable-opencore-amr \
            --enable-openssl \
            --enable-opus \
            --enable-shine \
            --enable-snappy \
            --enable-soxr \
            --enable-speex \
            --enable-srt \
            --enable-twolame \
            --enable-vo-amrwbenc \
            --enable-zimg \
            --enable-chromaprint \
            2>&1 | tee build_console.log
          BUILD_EXIT=$?
          # Stop the background SRT-patch watcher now that the build is done
          kill "$SRT_WATCHER_PID" 2>/dev/null || true
          echo "android.sh exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            exit $BUILD_EXIT
          fi
          # Extra safety net: if no AAR exists after a "successful" exit, force failure
          if [ -z "$(find . -name '*.aar' -print -quit)" ]; then
            echo "ERROR: android.sh reported success but no .aar file was produced."
            exit 1
          fi

      - name: Show whether SRT ENABLE_APPS patch applied (on failure)
        if: failure()
        run: |
          echo "----- searching for SRT CMakeLists.txt -----"
          FILE=$(find . -path "*/src/srt/CMakeLists.txt" -print -quit 2>/dev/null)
          if [ -n "$FILE" ]; then
            echo "Found: $FILE"
            grep -n "option(ENABLE_APPS" "$FILE" || echo "ENABLE_APPS option line not found"
          else
            echo "SRT CMakeLists.txt not found (source may not have been downloaded yet)"
          fi

      - name: Show libvpx config.log on failure (if present)
        if: failure()
        run: |
          echo "----- searching for libvpx config.log -----"
          LOG=$(find . -path "*/libvpx/*" -name "config.log" -print -quit 2>/dev/null)
          if [ -n "$LOG" ]; then
            echo "Found: $LOG"
            echo "----- last 200 lines -----"
            tail -n 200 "$LOG"
          else
            echo "No libvpx config.log found (search path: */libvpx/*config.log)"
            find . -iname "config.log" 2>/dev/null | head -20
          fi

      - name: Show tail of build.log on failure
        if: failure()
        run: |
          echo "----- last 300 lines of build.log -----"
          tail -n 300 build.log || echo "build.log not found"

      - name: Show tail of build_console.log on failure
        if: failure()
        run: |
          # build.log only captures the per-library configure/make output.
          # The final ndk-build phase that compiles ffmpeg-kit's own JNI
          # wrapper (libffmpegkit.so / libffmpegkit_abidetect.so) runs outside
          # that logging path, so its actual error only shows up here.
          echo "----- last 300 lines of build_console.log -----"
          tail -n 300 build_console.log || echo "build_console.log not found"

      - name: Locate AAR output
        if: success()
        run: |
          find . -name "*.aar" -exec ls -lh {} \;

      - name: Upload AAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-full-16kb-aar
          path: |
            **/*.aar
          if-no-files-found: error

      - name: Upload full build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            build_console.log
          if-no-files-found: ignore
