name: Build ffmpeg-kit-full 16KB AAR

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout ffmpeg-kit source
        uses: actions/checkout@v4
        with:
          repository: arthenica/ffmpeg-kit
          ref: main

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git doxygen nasm \
            cmake gcc gperf texinfo yasm bison autogen wget autopoint \
            meson ninja-build ragel groff gtk-doc-tools libtasn1-6-dev \
            unzip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK cmdline-tools and NDK r26d (self-managed, no third-party SDK/NDK actions)
        run: |
          set -e
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -sSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null || true
          # Pinned to r26d, not r27: NDK r27 dropped the NDK_PROC_*_ABI / NDK_ARCH_*_ABI
          # compatibility variables from build/cmake/abis.cmake. CMake's own
          # Android-Determine.cmake relies on those when a dependency (e.g. libsrt)
          # configures via raw CMAKE_SYSTEM_PROCESSOR=aarch64 instead of the NDK's
          # own android.toolchain.cmake — that combination fails on r27+ with
          # "Android: Unknown processor CMAKE_SYSTEM_PROCESSOR='aarch64'".
          # r26d still has the compat shims, and our manual 16KB linker flags below
          # are Google's documented approach for r27-or-lower anyway, so this
          # doesn't cost us anything on the 16KB-alignment goal.
          sdkmanager --install "ndk;26.3.11579264" "platform-tools" "platforms;android-34" > /dev/null
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Confirm SDK/NDK environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          ls "$ANDROID_NDK_ROOT" | head -20

      - name: Patch Android.mk for 16KB page size
        run: |
          MK=android/jni/Android.mk
          sed -i '/LOCAL_MODULE *:= *ffmpegkit$/a LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384' "$MK"
          sed -i '/LOCAL_MODULE *:= *ffmpegkit_abidetect$/a LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384' "$MK"
          echo "----- Patched Android.mk (grep check) -----"
          grep -n -A1 "LOCAL_MODULE" "$MK"

      - name: Patch ffmpeg.sh LDFLAGS for 16KB page size
        run: |
          FILE=scripts/android/ffmpeg.sh
          # Insert 16KB linker flags into the LDFLAGS export line used during FFmpeg's own build
          sed -i 's/^export LDFLAGS="\$(get_ldflags "\${LIB_NAME}")"$/export LDFLAGS="$(get_ldflags "${LIB_NAME}") -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"/' "$FILE"
          echo "----- Patched ffmpeg.sh (grep check) -----"
          grep -n "LDFLAGS=" "$FILE" || true

      - name: Patch fftools_ffmpeg_mux_init.c for NDK r26+ Clang bit-field error
        run: |
          # Newer Clang (bundled with NDK r26+) added -Wsingle-bit-bitfield-constant-conversion,
          # which -Werror promotes to a hard error. FFmpeg's EncStats struct declares these as
          # signed 1-bit fields (legal range -1..0) but initializes them with the literal 1,
          # which is only valid for an unsigned 1-bit field (range 0..1). This is the same fix
          # arthenica applied upstream for this exact error (ffmpeg-kit issue #1076): widen the
          # three fields to unsigned.
          FILE=android/ffmpeg-kit-android-lib/src/main/cpp/fftools_ffmpeg_mux_init.c
          sed -i -E \
            -e 's/\bint([[:space:]]+pre_only:1;)/unsigned int\1/' \
            -e 's/\bint([[:space:]]+post_only:1;)/unsigned int\1/' \
            -e 's/\bint([[:space:]]+need_input_data:1;)/unsigned int\1/' \
            "$FILE"
          echo "----- Patched fftools_ffmpeg_mux_init.c (grep check) -----"
          grep -n "unsigned int.*pre_only:1\|unsigned int.*post_only:1\|unsigned int.*need_input_data:1" "$FILE"
          MATCHES=$(grep -c "unsigned int.*pre_only:1\|unsigned int.*post_only:1\|unsigned int.*need_input_data:1" "$FILE" || true)
          if [ "$MATCHES" -lt 3 ]; then
            echo "ERROR: expected 3 patched bit-field declarations, found $MATCHES. Upstream source may have changed — check this file manually."
            exit 1
          fi

      - name: Build ffmpeg-kit (full minus fontconfig, non-GPL, arm64-v8a only)
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          chmod +x android.sh
          set -o pipefail
          # fontconfig is intentionally OMITTED. It only exists to let libass look up
          # fonts by family name from a system font database; Android has no such
          # database anyway, so real-world integrations pass libass a font file path
          # directly. Its only purpose here was pulling in libuuid, whose gen_uuid.c
          # calls flock() without including the header that declares it under
          # -std=c99 on Bionic — modern Clang treats that as a hard error
          # (-Wimplicit-function-declaration), not a warning. Dropping fontconfig
          # removes the broken dependency instead of patching a legacy C file, and
          # costs nothing relevant to TLS/HTTP/codec support.
          # freetype and fribidi are kept: freetype does glyph rendering (used by
          # libass directly) and fribidi does bidi text shaping — neither depends
          # on libuuid.
          ./android.sh \
            --disable-arm-v7a \
            --disable-arm-v7a-neon \
            --disable-x86 \
            --disable-x86-64 \
            --enable-android-media-codec \
            --enable-android-zlib \
            --enable-dav1d \
            --enable-freetype \
            --enable-fribidi \
            --enable-gmp \
            --enable-gnutls \
            --enable-kvazaar \
            --enable-lame \
            --enable-libass \
            --enable-libiconv \
            --enable-libilbc \
            --enable-libtheora \
            --enable-libvorbis \
            --enable-libvpx \
            --enable-libwebp \
            --enable-libxml2 \
            --enable-opencore-amr \
            --enable-openssl \
            --enable-opus \
            --enable-shine \
            --enable-snappy \
            --enable-soxr \
            --enable-speex \
            --enable-srt \
            --enable-twolame \
            --enable-vo-amrwbenc \
            --enable-zimg \
            --enable-chromaprint \
            2>&1 | tee build_console.log
          BUILD_EXIT=$?
          echo "android.sh exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            exit $BUILD_EXIT
          fi
          # Extra safety net: if no AAR exists after a "successful" exit, force failure
          if [ -z "$(find . -name '*.aar' -print -quit)" ]; then
            echo "ERROR: android.sh reported success but no .aar file was produced."
            exit 1
          fi

      - name: Show tail of build.log on failure
        if: failure()
        run: |
          echo "----- last 300 lines of build.log -----"
          tail -n 300 build.log || echo "build.log not found"

      - name: Show tail of build_console.log on failure
        if: failure()
        run: |
          # build.log only captures the per-library configure/make output.
          # The final ndk-build phase that compiles ffmpeg-kit's own JNI
          # wrapper (libffmpegkit.so / libffmpegkit_abidetect.so) runs outside
          # that logging path, so its actual error only shows up here.
          echo "----- last 300 lines of build_console.log -----"
          tail -n 300 build_console.log || echo "build_console.log not found"

      - name: Locate AAR output
        if: success()
        run: |
          find . -name "*.aar" -exec ls -lh {} \;

      - name: Upload AAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-full-16kb-aar
          path: |
            **/*.aar
          if-no-files-found: error

      - name: Upload full build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            build_console.log
          if-no-files-found: ignore
